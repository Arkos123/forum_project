server:
  port: ${ANNOUNCEMENT_SERVICE_PORT:8086}

spring:
  application:
    name: announcement-service
  config:
    import: "optional:file:./.env"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/study_main}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

internal:
  service:
    token: ${INTERNAL_SERVICE_TOKEN:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info

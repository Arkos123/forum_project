version: "3.8"

services:
  # ============================================================
  # Redis 7 - 缓存/限流/JWT黑名单
  # 端口: localhost:6379
  # 注意: 项目使用 database 1，无密码
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: forum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MySQL 8.0 - 主数据库
  # 端口: localhost:3306
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: forum-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: study_main
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../study.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # Elasticsearch 8.x - 全文搜索
  # HTTPS: https://localhost:9200 （Java 代码强制使用 SSL）
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: forum-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # ES 8.x 默认开启安全+SSL，只需设密码
      - ELASTIC_PASSWORD=123456
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "-u", "elastic:123456", "https://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # RabbitMQ 3.x - 消息队列（邮件发送、错误日志）
  # AMQP: localhost:5672
  # 管理界面: http://localhost:15672
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: forum-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"    # AMQP 协议端口
      - "15672:15672"  # 管理界面端口
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MinIO - 对象存储（图片上传）
  # API: http://localhost:9000
  # 管理界面: http://localhost:9001
  # ============================================================
  minio:
    image: quay.io/minio/minio:latest
    container_name: forum-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"   # S3 API 端口
      - "9001:9001"   # Web 管理界面端口
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  mysql-data:
  es-data:
  rabbitmq-data:
  minio-data: